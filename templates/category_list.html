{% extends 'base.html' %}
{% block title %}Categories{% endblock %}

{% block content %}

<div class="page-header">
  <h1><i class="fas fa-folder me-2 text-primary"></i>Categories</h1>
  <a href="{% url 'category-add' %}" class="btn btn-primary">
    <i class="fas fa-plus me-1"></i> Add Category
  </a>
</div>

<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="table-responsive">
        <table class="table mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for cat in categories %}
            <tr>
              <td class="text-muted" style="font-size:0.8rem; width:48px;">
                {{ forloop.counter }}
              </td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div style="width:32px; height:32px; background:#eef0fe;
                              border-radius:8px; display:flex; align-items:center;
                              justify-content:center;">
                    <i class="fas fa-folder" style="color:#3d5af1; font-size:0.85rem;"></i>
                  </div>
                  <span style="font-weight:700; color:#1a1f36;">{{ cat.name }}</span>
                </div>
              </td>
              <td class="text-end">
                <!-- ← ADDED Edit button -->
                <a href="{% url 'category-edit' cat.pk %}"
                   class="btn btn-primary btn-sm me-1">
                  <i class="fas fa-pen me-1"></i> Edit
                </a>
                <a href="{% url 'category-delete' cat.pk %}"
                   class="btn btn-outline-danger btn-sm">
                  <i class="fas fa-trash me-1"></i> Delete
                </a>
              </td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="3" class="text-center py-5 text-muted">
                <i class="fas fa-folder-open fa-2x mb-2 d-block" style="color:#d0d4e8;"></i>
                No categories yet.
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In Via {{ provider.name }} | Hangarin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #f4f6fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .auth-logo {
      width: 52px; height: 52px;
      background: #3d5af1;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.4rem; color: #fff;
    }
    .provider-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.6rem;
    }
    .github-icon { background: #24292e; color: #fff; }
    .google-icon { background: #fff; border: 2px solid #e8ecf1; color: #555; }
    .btn-continue {
      background: #3d5af1;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 32px;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-continue:hover { background: #2d45d4; color: #fff; }
    .btn-cancel {
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 10px 32px;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="auth-card">

    <div class="auth-logo">
      <i class="fas fa-check-double"></i>
    </div>

    {% if provider.id == 'github' %}
      <div class="provider-icon github-icon">
        <i class="fab fa-github"></i>
      </div>
    {% else %}
      <div class="provider-icon google-icon">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="28" height="28"/>
      </div>
    {% endif %}

    <h4 style="font-weight:800; color:#1a1f36; margin-bottom:8px;">
      Sign In Via {{ provider.name }}
    </h4>
    <p class="text-muted mb-4" style="font-size:0.9rem;">
      You are about to sign in to <strong>Hangarin</strong> using your
      <strong>{{ provider.name }}</strong> account. Click Continue to proceed.
    </p>

    <form method="post" action="{% url 'socialaccount_login' provider.id %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit" class="btn-continue">
        {% if provider.id == 'github' %}
          <i class="fab fa-github me-2"></i>
        {% else %}
          <i class="fab fa-google me-2"></i>
        {% endif %}
        Continue with {{ provider.name }}
      </button>
    </form>

    <a href="{% url 'account_login' %}" class="btn btn-outline-secondary btn-cancel">
      <i class="fas fa-arrow-left me-1"></i> Back to Login
    </a>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

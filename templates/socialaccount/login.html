{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Confirm Login | Hangarin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f4f6fc;
    }
    .auth-card {
      max-width: 500px;
      width: 100%;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      padding: 48px 44px;
      text-align: center;
    }
    .auth-logo {
      width: 52px; height: 52px;
      background: #3d5af1;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.4rem; color: #fff;
    }
    .btn-continue {
      background: #3d5af1;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 32px;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-continue:hover { background: #2d45d4; color: #fff; }
    .btn-cancel {
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 10px 32px;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <i class="fas fa-check-double"></i>
    </div>
    <h4 style="font-weight:800; color:#1a1f36; margin-bottom:8px;">
      Confirm Sign In
    </h4>
    <p class="text-muted mb-4" style="font-size:0.9rem;">
      You are about to sign in to <strong>Hangarin</strong> using your
      <strong>{{ provider.name }}</strong> account.
    </p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-continue">
        Continue with {{ provider.name }}
      </button>
    </form>
    <a href="{% url 'account_login' %}" class="btn btn-outline-secondary btn-cancel">
      Cancel
    </a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

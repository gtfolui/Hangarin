{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logout | Hangarin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #f4f6fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logout-icon {
      width: 64px; height: 64px;
      background: #fff0f0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.5rem; color: #dc3545;
    }
    .btn-confirm {
      background: #dc3545;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 10px 28px;
      transition: background 0.2s;
    }
    .btn-confirm:hover { background: #b02a37; color: #fff; }
    .btn-cancel {
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 10px 28px;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logout-icon">
      <i class="fas fa-sign-out-alt"></i>
    </div>
    <h4 style="font-weight:800; color:#1a1f36; margin-bottom:8px;">Sign out?</h4>
    <p class="text-muted mb-4" style="font-size:0.9rem;">
      Are you sure you want to sign out of Hangarin?
    </p>
    <form method="POST" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <div class="d-flex gap-2 justify-content-center">
        <button type="submit" class="btn-confirm">
          <i class="fas fa-sign-out-alt me-1"></i> Yes, Sign Out
        </button>
        <a href="/" class="btn btn-outline-secondary btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends 'base.html' %}
{% block title %}Delete — {{ object }}{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-5 text-center">

      <!-- Icon -->
      <div style="width:72px; height:72px; background:#f8d7da; border-radius:50%;
                  margin:0 auto 20px; display:flex; align-items:center; justify-content:center;">
        <i class="fas fa-trash-alt fa-xl" style="color:#dc3545;"></i>
      </div>

      <h4 style="font-weight:800; color:#1a1f36; margin-bottom:8px;">
        Delete this item?
      </h4>
      <p class="text-muted mb-4" style="font-size:0.9rem;">
        You are about to permanently delete
        <strong style="color:#1a1f36;">{{ object }}</strong>.
        This action <strong>cannot</strong> be undone.
      </p>

      <form method="POST">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center">
          <button type="submit" class="btn btn-danger px-4">
            <i class="fas fa-trash me-1"></i> Yes, Delete
          </button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
            <i class="fas fa-arrow-left me-1"></i> Cancel
          </a>
        </div>
      </form>

    </div>
  </div>
</div>

{% endblock %}
